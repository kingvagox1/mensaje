<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mich ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  overflow: hidden;
}

/* FONDO */
.fondo {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  animation: mover 30s linear infinite;
  opacity: 0.2;
  pointer-events: none;
}

@keyframes mover {
  from {transform: translate(0,0);}
  to {transform: translate(-200px,-200px);}
}

/* CONTENIDO */
.container {
  position: relative;
  z-index: 10;
  text-align: center;
}

/* SOBRE */
.sobre {
  background: #ff4d6d;
  padding: 20px 30px;
  border-radius: 12px;
  font-size: 20px;
  color: white;
  cursor: pointer;
}

/* CARTA */
.mensaje {
  display: none;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 320px;
  margin-top: 10px;
}

/* BOTÓN */
.boton {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* EXTRA */
.extra {
  display: none;
  margin-top: 10px;
  color: #ff4d6d;
}

/* CORAZONES */
.corazon {
  position: absolute;
  color: red;
  animation: subir 5s linear infinite;
  pointer-events: none;
}

@keyframes subir {
  from {transform: translateY(0);}
  to {transform: translateY(-800px);}
}
</style>
</head>

<body>

<div class="fondo"></div>

<div class="container">

<div id="sobre" class="sobre">
💌 Ábreme Mich ❤️
</div>

<div id="mensaje" class="mensaje">
<h3>Para Mich ❤️</h3>

<p>
No sé qué nos depara el destino…<br><br>
pero sí sé algo:<br>
mientras estés tú,<br>
yo voy a seguir eligiéndote todos los días.
</p>

<button id="btn" class="boton">❤️ Tócame</button>

<div id="extra" class="extra">
Te amo mucho Mich ❤️
</div>

</div>

</div>

<script>
let sobre = document.getElementById("sobre");
let mensaje = document.getElementById("mensaje");
let btn = document.getElementById("btn");
let extra = document.getElementById("extra");

/* ABRIR CARTA */
sobre.addEventListener("click", () => {
  sobre.style.display = "none";
  mensaje.style.display = "block";
});

/* BOTÓN */
btn.addEventListener("click", () => {
  extra.style.display = "block";
});

/* CORAZONES */
setInterval(()=>{
  let c = document.createElement("div");
  c.className="corazon";
  c.innerHTML="❤️";
  c.style.left=Math.random()*window.innerWidth+"px";
  c.style.top=window.innerHeight+"px";
  document.body.appendChild(c);

  setTimeout(()=>c.remove(),5000);
},400);
</script>

</body>
</html>
