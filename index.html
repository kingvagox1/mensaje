<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chupalo</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    .pantalla-movil {
      width: 271px;
      height: 558px;
      background: #fff;
      border: 4px solid #222;
      border-radius: 32px;
      box-shadow: 0 8px 32px #0002;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      overflow: hidden;
    }
    .titulo-movil {
      color: #b71c1c;
      font-size: 2.2rem;
      margin: 32px 0 36px 0;
      font-weight: bold;
      letter-spacing: 2px;
      text-align: center;
      width: 100%;
    }
    .botones-si-no {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-si {
      padding: 1rem 2.5rem;
      font-size: 1.3rem;
      border-radius: 8px;
      border: none;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 32px;
      position: static;
      z-index: 1;
    }
    #btn-si:hover {
      background: #0d47a1;
      transform: scale(1.07);
    }
    #btn-no {
      padding: 1rem 2.5rem;
      font-size: 1.3rem;
      border-radius: 8px;
      border: none;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      position: absolute;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="pantalla-movil">
    <div class="titulo-movil">chupalo</div>
    <div class="botones-si-no">
      <button id="btn-si">Sí</button>
      <button id="btn-no">No</button>
    </div>
  </div>
  <script>
    const btnNo = document.getElementById('btn-no');
    const container = document.querySelector('.botones-si-no');
    function moverNo() {
      const padding = 10;
      const maxX = container.offsetWidth - btnNo.offsetWidth - padding;
      const maxY = container.offsetHeight - btnNo.offsetHeight - padding;
      const randomX = Math.floor(Math.random() * maxX) + padding/2;
      const randomY = Math.floor(Math.random() * maxY) + padding/2;
      btnNo.style.left = randomX + 'px';
      btnNo.style.top = randomY + 'px';
    }
    btnNo.addEventListener('mouseenter', moverNo);
    btnNo.addEventListener('click', function(e) {
      e.preventDefault();
      moverNo();
    });
    moverNo();
  </script>
</body>
</html>
